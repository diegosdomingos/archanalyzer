name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-api-gateway:
    name: Testes - API Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Instalar dependências
        working-directory: ./api-gateway
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Rodar testes
        working-directory: ./api-gateway
        run: pytest tests/ -v

  test-upload-service:
    name: Testes - Upload Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Instalar dependências
        working-directory: ./upload-service
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Rodar testes
        working-directory: ./upload-service
        run: pytest tests/ -v

  test-processing-service:
    name: Testes - Processing Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Instalar dependências
        working-directory: ./processing-service
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Rodar testes
        working-directory: ./processing-service
        run: pytest tests/ -v

  test-report-service:
    name: Testes - Report Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Instalar dependências
        working-directory: ./report-service
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Rodar testes
        working-directory: ./report-service
        run: pytest tests/ -v

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs:
      - test-api-gateway
      - test-upload-service
      - test-processing-service
      - test-report-service
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Build todas as imagens
        run: docker compose build