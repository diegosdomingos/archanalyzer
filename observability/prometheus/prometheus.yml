global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8000']

  - job_name: 'upload-service'
    static_configs:
      - targets: ['upload-service:8001']

  - job_name: 'report-service'
    static_configs:
      - targets: ['report-service:8003']